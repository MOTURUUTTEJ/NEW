<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Cloud Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Using a standard CDN for Font Awesome to avoid CORS/kit issues -->
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <h1>S3 Cloud Explorer</h1>
                <p>Secure File Management Interface</p>
            </div>
            <div class="bucket-selector">
                <label for="bucket-select">Current Bucket</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="bucket-select" style="flex-grow: 1;">
                        <option value="" disabled selected>Select a bucket...</option>
                    </select>
                    <button id="create-bucket-btn" class="icon-btn" title="Create New Bucket"
                        style="background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255, 255, 255, 0.3); padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease;">
                        <i class="fas fa-plus"></i> New
                    </button>
                </div>
            </div>
        </header>

        <main>
            <section class="upload-section glass-panel">
                <h2><i class="fas fa-cloud-upload-alt"></i> Upload Files</h2>
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-content">
                        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                            </path>
                        </svg>
                        <p>Drag & Drop files here or <span class="browse-btn">Browse</span></p>
                        <input type="file" id="file-input" hidden>
                    </div>
                </div>
                <div id="upload-progress-container" class="hidden">
                    <div class="progress-bar">
                        <div class="progress-fill" id="upload-progress"></div>
                    </div>
                    <span id="upload-status">Uploading...</span>
                </div>
            </section>

            <section class="files-section glass-panel">
                <div class="files-header">
                    <h2><i class="fas fa-folder-open"></i> File Explorer</h2>
                    <button id="refresh-btn" class="icon-btn" title="Refresh"><svg fill="none" stroke="currentColor"
                            viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                            </path>
                        </svg></button>
                </div>

                <div class="table-container">
                    <table id="files-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Size</th>
                                <th>Last Modified</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="files-list">
                            <!-- Files will be populated here -->
                            <tr class="empty-state">
                                <td colspan="4">Select a bucket to view files</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by Node.js & AWS S3</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
